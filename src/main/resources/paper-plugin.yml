name: SincePet
version: '1.0'
main: net.danh.sincePet.SincePet
api-version: '1.21'
folia-supported: true
authors: [ VoChiDanh ]
website: https://gitlab.com/sincerpg/SincePet/-/wikis/home
dependencies:
  server:
    MythicLib:
      load: BEFORE
      required: true
    MythicMobs:
      load: BEFORE
      required: true
    WorldGuard:
      load: BEFORE
      required: true
    PlaceholderAPI:
      load: BEFORE
      required: false
permissions:
  sincepet.admin:
    description: SincePet Admin permission
    default: op
  sincepet.pet.hasall:
    description: Allows access to every configured pet
    default: op
  sincepet.pet.*:
    description: Allows access to every pet permission node
    default: op
    children:
      sincepet.pet.hasall: true
  sincepet.ride:
    description: Allows riding pets through commands, GUI actions, and right-clicking
    default: op
  sincepet.skill:
    description: Allows using active pet abilities through /pet skill
    default: op
