border:
  material: "BLACK_STAINED_GLASS_PANE"
  amount: 1
  name: " "
  model_data: 0
  glow: false
  item_flags:
    - "HIDE_ATTRIBUTES"

collection:
  pet_item:
    # Set false if you want to provide your own material/skull_texture instead of each pet's texture.
    use_pet_texture: true
    material: "PLAYER_HEAD"
    amount: 1
    name: "<name>"
    lore:
      - ""
      - " <gray>Level: <white><level>"
      - " <gray>Stat Bonus: <green>+<value> <stat>"
      - " <gray>DMG Inheritance: <green><inheritance>%"
      - ""
      - " <gray>Passive Abilities:"
      - " <skill.passive.1> <dark_gray>[<yellow><skill.trigger.passive.1><dark_gray>]"
      - " <white><skill.description.passive.1>"
      - " <skill.passive.2> <dark_gray>[<yellow><skill.trigger.passive.2><dark_gray>]"
      - " <white><skill.description.passive.2>"
      - " <gray>Active Abilities:"
      - " <skill.active.1> <dark_gray>[<yellow><skill.trigger.active.1><dark_gray>]"
      - " <white><skill.description.active.1>"
      - " <skill.active.2> <dark_gray>[<yellow><skill.trigger.active.2><dark_gray>]"
      - " <white><skill.description.active.2>"
      - " <gray>Status: <status>"
      - ""
      - "<yellow>Click to summon!"
    status:
      unlocked: "<green>Unlocked"
      locked: "<red>Locked"
    display_values:
      # These mappings change how raw config values appear in placeholders.
      # Example: <stat> uses display_values.stats.HEALTH instead of showing HEALTH.
      pets:
        BEAR: "Grizzly Bear"
        DRAGON: "Ender Dragon"
        EAGLE: "Sky Eagle"
        FOX: "Swift Fox"
        FROG: "Swamp Frog"
        MONKEY: "Monkey King"
        PANDA: "Bamboo Panda"
        PARROT: "Pirate Parrot"
        PHOENIX: "Phoenix Ember"
        SLOTH: "Sleepy Sloth"
        TIGER: "Bengal Tiger"
        TURTLE: "Ancient Turtle"
        UNICORN: "Mystic Unicorn"
        WOLF: "Wolf Spirit"
      stats:
        HEALTH: "Health"
        MAX_HEALTH: "Max Health"
        ATTACK_DAMAGE: "Attack Damage"
        CRITICAL_STRIKE_CHANCE: "Critical Strike Chance"
        CRITICAL_STRIKE_POWER: "Critical Strike Power"
        HEALTH_REGENERATION: "Health Regeneration"
        MAGIC_DAMAGE: "Magic Damage"
        MOVEMENT_SPEED: "Movement Speed"
        PHYSICAL_DAMAGE: "Physical Damage"
      triggers:
        ACTIVE: "Command"
        BED_ENTER: "Bed Enter"
        CHAT: "Chat"
        FLIGHT_START: "Flight Start"
        GAMEMODE_CHANGE: "Gamemode Change"
        GLIDE_START: "Glide Start"
        HARVEST_BLOCK: "Harvest Block"
        ITEM_CONSUME: "Item Consume"
        JUMP: "Jump"
        MOVE: "Move"
        OWNER_DAMAGED: "Owner Damaged"
        OWNER_DAMAGED_BY_ENTITY: "Owner Damaged By Entity"
        OWNER_RESPAWN: "Owner Respawn"
        PHYSICAL_INTERACT: "Physical Interact"
        PROJECTILE_LAUNCH: "Projectile Launch"
        RIPTIDE: "Riptide"
        RIGHT_CLICK_AIR: "Right Click"
        SNEAK: "Sneak"
        SNEAK_START: "Sneak Start"
        SPRINT_START: "Sprint Start"
        SWAP_HAND: "Swap Hand"
        SWIM_START: "Swim Start"
        DOUBLE_SNEAK: "Double Sneak"
        WORLD_CHANGE: "World Change"
      skill_types:
        active: "Active"
        passive: "Passive"
      skills:
        bamboo_snack: "Bamboo Snack"
        banana_toss: "Banana Toss"
        berry_eat: "Berry Eat"
        breath: "Dragon Breath"
        counter_howl: "Counter Howl"
        dash: "Dash"
        dive: "Dive"
        dragon_scales: "Dragon Scales"
        eagle_eye: "Eagle Eye"
        fireball: "Fireball"
        hibernation: "Hibernation"
        horn_pierce: "Horn Pierce"
        jump_boost: "Jump Boost"
        magic_aura: "Magic Aura"
        maul: "Maul"
        mimic: "Mimic"
        monkey_agility: "Monkey Agility"
        rebirth: "Rebirth"
        rift_bite: "Rift Bite"
        roar: "Roar"
        roll: "Roll"
        screech: "Screech"
        shell_shield: "Shell Shield"
        sleepy_heal: "Sleepy Heal"
        swim_boost: "Swim Boost"
        takeoff: "Takeoff"
        tiger_pounce: "Tiger Pounce"
        water_spout: "Water Spout"
        yawn: "Yawn"
      mythic_skills:
        ARCANE_HAIL: "Arcane Hail"
        ARCANE_RIFT: "Arcane Rift"
        BANANA_TOSS: "Banana Toss"
        BEAR_HIBERNATION: "Bear Hibernation"
        BEAR_MAUL: "Bear Maul"
        DRAGON_BREATH: "Dragon Breath"
        DRAGON_SCALES: "Dragon Scales"
        EAGLE_DIVE: "Eagle Dive"
        EAGLE_EYE: "Eagle Eye"
        FOX_DASH: "Fox Dash"
        FOX_HEAL: "Fox Heal"
        FROG_JUMP: "Frog Jump"
        FROG_SWIM: "Frog Swim"
        MONKEY_AGILITY: "Monkey Agility"
        PANDA_EAT: "Panda Eat"
        PANDA_ROLL: "Panda Roll"
        PARROT_FLY: "Parrot Fly"
        PARROT_MIMIC: "Parrot Mimic"
        PARROT_SCREECH: "Parrot Screech"
        PHOENIX_FIREBALL: "Phoenix Fireball"
        PHOENIX_REBIRTH: "Phoenix Rebirth"
        SLOTH_HEAL: "Sleepy Heal"
        SLOTH_YAWN: "Yawn"
        TIGER_POUNCE: "Tiger Pounce"
        TIGER_ROAR: "Tiger Roar"
        TURTLE_SHIELD: "Turtle Shield"
        TURTLE_SPOUT: "Turtle Spout"
        UNICORN_AURA: "Unicorn Aura"
        UNICORN_PIERCE: "Unicorn Pierce"
    data:
      key: "sincepet:pet_id"
      value: "<pet_id>"

  # Optional per-pet override. Key must match the pet id in pets/*.yml.
  # All normal item meta keys are supported: material, amount, name, lore,
  # model_data/custom_model_data, skull_texture, glow, enchants, item_flags,
  # hide_attributes, hide_enchants, hide_unbreakable, unbreakable, damage, data.
  # items:
  #   SLOTH:
  #     material: "PLAYER_HEAD"
  #     use_pet_texture: true
  #     name: "<green><b>Custom Sloth"
  #     lore:
  #       - "<gray>ID: <pet_id>"
  #       - "<yellow>Click to summon!"

buttons:
  detail:
    slot: 48
    material: "BOOK"
    name: "<aqua><b>Active Pet"
    lore:
      - "<gray>Open current pet controls"
    display:
      conditions:
        - "active_pet"

  remove:
    slot: 49
    material: "BARRIER"
    name: "<red><b>Despawn Pet"
    lore:
      - "<gray>Click to dismiss your active pet"
    display:
      conditions:
        - "active_pet"

  previous:
    slot: 45
    material: "ARROW"
    name: "<yellow>Previous Page"

  next:
    slot: 53
    material: "ARROW"
    name: "<yellow>Next Page"

detail:
  buttons:
    back:
      slot: 18
      material: "ARROW"
      name: "<yellow>Back"
    back_detail:
      slot: 18
      material: "ARROW"
      name: "<yellow>Back"
    ride:
      slot: 11
      material: "SADDLE"
      name: "<green><b>Ride Pet"
      lore:
        - "<gray>Mount your active pet"
      display:
        conditions:
          - "active_pet"
          - "rideable"
          - "permission:sincepet.ride"
    settings:
      slot: 13
      material: "COMPARATOR"
      name: "<aqua><b>Pet Settings"
      display:
        conditions:
          - "active_pet"
    upgrades:
      slot: 15
      material: "ANVIL"
      name: "<gold><b>Pet Upgrades"
      glow: true
      display:
        conditions:
          - "active_pet"
          - "has_upgrades"

settings:
  show_name:
    slot: 10
    material: "NAME_TAG"
    name: "<aqua>Name Display: <state>"
    item_flags:
      - "HIDE_ATTRIBUTES"
  auto_attack:
    slot: 12
    material: "IRON_SWORD"
    name: "<red>Auto Attack: <state>"
    hide_attributes: true
  stat_buff:
    slot: 14
    material: "BREWING_STAND"
    name: "<green>Stat Buff: <state>"

upgrade_items:
  available:
    # If material is omitted, the upgrade material from pets.yml is used.
    name: "<gold><upgrade>"
    glow: true
    hide_attributes: true
    lore:
      - ""
      - "<gray>Level: <white><level>/<max_level> <dark_gray>(next <next_level>)"
      - "<gray><requirement>"
      - "<gray>Your value: <green><current_value>"
      - ""
      - "<gray>Stat Bonus: <green><stat_bonus> <dark_gray>-> <green><next_stat_bonus>"
      - "<gray>Damage Bonus: <red><damage_bonus> <dark_gray>-> <red><next_damage_bonus>"
      - ""
      - "<yellow>Click to upgrade!"

  locked:
    name: "<red><upgrade>"
    glow: false
    hide_attributes: true
    lore:
      - ""
      - "<gray>Level: <white><level>/<max_level>"
      - "<red><requirement>"
      - "<gray>Your value: <red><current_value>"
      - ""
      - "<red>You do not meet the requirement."

  maxed:
    name: "<green><upgrade>"
    glow: true
    hide_attributes: true
    lore:
      - ""
      - "<gray>Level: <gold><level>/<max_level>"
      - "<gray>Stat Bonus: <green><stat_bonus>"
      - "<gray>Damage Bonus: <red><damage_bonus>"
      - ""
      - "<gold>MAXED"

  # Optional per-upgrade override. Key must match the upgrade id in pets.yml.
  # items:
  #   ember:
  #     material: "FIRE_CHARGE"
  #     name: "<gradient:red:gold>Custom Ember</gradient>"
  #     model_data: 1001
  #     lore:
  #       - "<gray>Level: <level>/<max_level>"
