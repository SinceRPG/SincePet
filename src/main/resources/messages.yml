# =====================================================
#               SINCE PET - MESSAGES
# =====================================================
# Hỗ trợ mã màu & (Legacy) và MiniMessage (<green>, <red>, ...)
# Dùng <gradient:red:blue>Text</gradient> để tạo màu gradient.

prefix: "<gray>[<gradient:#00FFAE:#00E0FF><bold>SincePet</bold></gradient><gray>] "

admin:
  reload: "<green>Đã tải lại cấu hình thành công!"
  no_permission: "<red>Bạn không có quyền sử dụng lệnh này."

pet:
  command:
    spawn: "<green>Đã triệu hồi <name><green>!"
    despawn: "<yellow>Đã thu hồi Pet."
    ride_success: "<green>Đang cưỡi Pet! Nhấn SHIFT để xuống."
    ride_fail: "<red>Bạn chưa triệu hồi Pet nào!"
    ride_not_allowed: "<red>Pet này không cưỡi được!"
    levelup_self: "<gold>Chúc mừng! <name> <gold>đã lên cấp <green><level><gold>!"
    levelup_other: "<green>Đã thăng cấp cho Pet của <target> lên cấp <level>."
    levelup_fail_target: "<red>Người chơi <target> không có Pet nào đang hoạt động."

  level:
    # Actionbar hiển thị khi Pet nhận XP
    # Placeholder: <amount>, <current_xp>, <max_xp>
    xp_actionbar: "<green>+ <amount> XP <gray>(<current_xp>/<max_xp>)"

  display:
    # Tên hiển thị trên đầu Pet
    name_format: "<name> <gray>[Lv.<level>]"

  gui:
    title: "<black><bold>Pet Collection <gray>(Trang <page>)"
    item_name: "<name>"
    status_unlocked: "<green>Đã sở hữu"
    status_locked: "<red>Chưa mở khóa"
    item_lore:
      - ""
      - " <gray>Cấp độ: <white><level>"
      - " <gray>Chỉ số: <green>+<value> <stat>"
      - " <gray>Kế thừa DMG: <green><inheritance>%"
      - ""
      - " <gray>Trạng thái: <status>"
      - ""
      - "<yellow>Click để triệu hồi!"

  worldguard:
    deny_spawn: "<red>Bạn không thể triệu hồi Pet ở khu vực này!"
    deny_ride: "<red>Khu vực này cấm cưỡi Pet!"
    auto_despawn: "<red>Pet của bạn đã bị thu hồi do đi vào khu vực cấm!"
    auto_dismount: "<red>Bạn bị buộc xuống xe do đi vào khu vực cấm cưỡi!"

  notifications:
    enter_deny_spawn: "<red>Bạn đã đi vào khu vực cấm Pet!"
    leave_deny_spawn: "<green>Bạn đã rời khỏi khu vực cấm Pet."
    enter_deny_ride: "<red>Bạn đã đi vào khu vực cấm cưỡi Pet!"
    leave_deny_ride: "<green>Bạn được phép cưỡi Pet trở lại."
    enter_deny_fly: "<red>Pet của bạn bị mất khả năng bay ở đây!"
    leave_deny_fly: "<green>Pet có thể bay trở lại."
    enter_deny_attack: "<red>Pet sẽ không tấn công ở khu vực này."
    leave_deny_attack: "<green>Pet đã sẵn sàng chiến đấu."
    enter_deny_buff: "<red>Hiệu ứng Pet bị vô hiệu hóa tại đây."
    leave_deny_buff: "<green>Hiệu ứng Pet đã kích hoạt lại."