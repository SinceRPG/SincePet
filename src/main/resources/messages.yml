# =====================================================
#               SINCE PET - MESSAGES
# =====================================================
# Supports Legacy (&) and MiniMessage (<green>, <bold>, etc.)
# Use <gradient:red:blue>Text</gradient> to create gradient colors.

prefix: "<gray>[<gradient:#00FFAE:#00E0FF><bold>SincePet</bold></gradient><gray>] "

admin:
  reload: "<green>Successfully reloaded configuration files!"

pet:
  command:
    all_pets: "All"
    spawn: "<green>Successfully summoned <name><green>!"
    despawn: "<yellow>Pet despawned and secured."
    ride_success: "<green>Riding Pet! Press SHIFT to dismount."
    ride_fail: "<red>You have not summoned any pet!"
    ride_not_allowed: "<red>This pet is not rideable!"
    skill_cast: "<green>Used pet ability <skill>."
    skill_cooldown: "<red><skill> is on cooldown for <seconds>s."
    skill_no_active: "<red>You have not summoned any pet!"
    skill_none: "<red>Your active pet has no active abilities."
    skill_not_found: "<red>Pet ability '<skill>' was not found."
    skill_unavailable: "<red>MythicMobs is not available, so pet abilities cannot be used."
    levelup_self: "<gold>Congratulations! <name> <gold>has reached level <green><level><gold>!"
    levelup_other: "<green>Successfully leveled up <target>'s pet to level <level>."
    levelup_fail_target: "<red>Player <target> currently has no active pet."

    max_level_success: "&aSuccessfully set the global pet level limit of &e<target> &ato &e<level>."
    max_level_receive: "&aYour global pet level limit has been updated to &e<level>."

    max_level_pet_success: "&aSuccessfully set the max level of &e<pet> &afor &e<target> &ato &e<level>."
    max_level_pet_receive: "&aYour &e<pet> &amax level has been increased to &e<level>."

    max_level_error_number: "&cThe level must be a positive integer!"
    no_permission: "&cYou do not have permission to use this!"
    player_not_found: "&cPlayer not found!"
    pet_not_found: "&cPet ID '<pet>' does not exist in the configuration!"

  mmocore:
    wrong_class: "<red>Your class cannot use this pet!"

  experience:
    max_level: "&cYour pet is already max level!"
    not_enough_inventory: "&cYou don't have enough {item_name}&c in your inventory."
    wrong_item_cursor: "&cYou must click with the correct item ({item_name}&c)!"
    not_enough_cursor: "&cYou don't have enough quantity on your cursor!"
    success: "&aSuccessfully added experience to your pet!"

  level:
    xp_actionbar: "&a+<amount> XP &8(&7<current_xp>/<max_xp>&8)"
    max_level_actionbar: "&6&lMAX LEVEL"

  display:
    name_format: "<name> <gray>[Lv.<level>]"

  upgrade:
    success: "<green>Upgraded <upgrade> <green>to level <level>."
    maxed: "<red>This upgrade is already maxed."
    requirement_failed: "<red>You do not meet the upgrade requirement."

  gui:
    title: "<black><bold>Pet Collection <gray>(Page <page>)"
    detail_title: "<black><bold>Pet Detail: <name>"
    settings_title: "<black><bold>Pet Settings"
    upgrades_title: "<black><bold>Pet Upgrades"
    no_active_pet: "<red>No Active Pet"
    enabled: "<green>ON"
    disabled: "<red>OFF"
    item_name: "<name>"
    status_unlocked: "<green>Unlocked"
    status_locked: "<red>Locked"
    item_lore:
      - ""
      - " <gray>Level: <white><level>"
      - " <gray>EXP: <green><current_exp> / <max_exp>"
      - " <gray>Stat Bonus: <green>+<value> <stat>"
      - " <gray>DMG Inheritance: <green><inheritance>%"
      - " <gray>Passive Abilities:"
      - " <skill.passive.1> <dark_gray>[<yellow><skill.trigger.passive.1><dark_gray>]"
      - " <white><skill.description.passive.1>"
      - " <skill.passive.2> <dark_gray>[<yellow><skill.trigger.passive.2><dark_gray>]"
      - " <white><skill.description.passive.2>"
      - " <gray>Active Abilities:"
      - " <skill.active.1> <dark_gray>[<yellow><skill.trigger.active.1><dark_gray>]"
      - " <white><skill.description.active.1>"
      - " <skill.active.2> <dark_gray>[<yellow><skill.trigger.active.2><dark_gray>]"
      - " <white><skill.description.active.2>"
      - " <gray>Status: <status>"
      - ""
      - "<yellow>Click to summon!"
  worldguard:
    deny_spawn: "<red>You cannot summon your pet in this area!"
    deny_ride: "<red>Riding is prohibited in this region!"
    auto_despawn: "<red>Your pet has been despawned due to restricted zone entry!"
    auto_dismount: "<red>You were forced to dismount (Restricted Area)!"

  notifications:
    enter_deny_spawn: "<red>You have entered a Pet-Restricted zone!"
    leave_deny_spawn: "<green>You have left the Pet-Restricted zone."
    enter_deny_ride: "<red>You have entered a No-Ride zone!"
    leave_deny_ride: "<green>You are permitted to ride pets again."
    enter_deny_fly: "<red>Your pet has lost its flying ability here!"
    leave_deny_fly: "<green>Your pet can fly again."
    enter_deny_attack: "<red>Your pet will not attack in this area."
    leave_deny_attack: "<green>Your pet is ready for combat."
    enter_deny_buff: "<red>Pet buffs are disabled here."
    leave_deny_buff: "<green>Pet buffs are active again."
