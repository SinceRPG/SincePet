name: Bug Report
description: Report a bug or issue with SincePet plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🐾 SincePet Bug Report
        Thank you for reporting an issue. Please fill out the form below with as much detail as possible to help us fix the problem faster. Ensure you check for existing issues before submitting.
  - type: input
    id: server-version
    attributes:
      label: Server Software & Version
      description: What version of Paper/Folia are you running? (Use `/version` command)
      placeholder: "Paper version git-Paper-123 (MC: 1.21.1)"
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: SincePet Version
      description: What version of SincePet are you running? (Check `/plugins` or the jar name)
      placeholder: 1.0
    validations:
      required: true
  - type: input
    id: dependencies
    attributes:
      label: Dependencies Versions
      description: Please list the versions of the required dependencies you are using (MythicLib, MythicMobs, WorldGuard, PlaceholderAPI).
      placeholder: MythicLib v1.7.1, MythicMobs v5.12.0, WorldGuard v7.0.16
    validations:
      required: true
  - type: dropdown
    id: database-type
    attributes:
      label: Database Type
      description: Which database are you using for SincePet?
      options:
        - SQLite (Local - database.db)
        - MySQL (Remote Server)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: For example, "When a player tries to ride a Phoenix pet, the server throws an error and the player gets kicked."
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. The more detailed, the better!
      placeholder: |
        1. Give myself 20 PlayerPoints.
        2. Spawn a 'PHOENIX' pet using the command.
        3. Attempt to upgrade 'Ember Core' in the GUI.
        4. See error in console and points are not deducted.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen instead of the bug.
      placeholder: "The pet should upgrade to Level 1, and 20 points should be deducted from my account."
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Relevant Configuration (pets.yml / config.yml)
      description: If the issue is related to specific pets, formulas, GUI, or physics, please paste the relevant configuration section here. Use code blocks (```yaml).
      placeholder: |
        ```yaml
        # Paste your config here
        ```
  - type: textarea
    id: errors
    attributes:
      label: Errors / Console Log
      description: If applicable, add a link to pastebin.com or mclo.gs with your server log/error message. Do NOT paste long logs directly here.
      placeholder: "https://mclo.gs/..."
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., issues with stats like PHYSICAL_DAMAGE, pet riding/flying bugs, upgrade point issues).
