name: Feature Request
description: Suggest an idea for SincePet
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please check if this feature has already been requested before opening a new one.
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what the feature is and why it is needed.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Provide an example of how this feature would be used by players or admins.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, configuration examples, or screenshots about the feature request here.
