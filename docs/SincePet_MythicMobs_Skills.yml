# =======================================================
# SincePet - Default MythicMobs Skills Configuration
# =======================================================
# To use these skills with your pets:
# 1. Copy this file into your server's folder: plugins/MythicMobs/Skills/
# 2. Type /mm reload
# 3. Equip your SincePet and the abilities will work automatically!
# =======================================================

